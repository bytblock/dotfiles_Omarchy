# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER, L, LocalSend, exec, uwsm-app -- /usr/bin/localsend
bindd = SUPER, M, BlueBubbles, exec, uwsm-app -- flatpak run app.bluebubbles.BlueBubbles --disable-features=GlobalShortcutsPortal
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, N, Typora, exec, uwsm-app -- typora --enable-wayland-ime

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Copilot button -> ChatGPT (keycode 201 = XF86Assistant)
# Hardware sends Super+Shift+XF86Assistant together
bindd = SUPER SHIFT, code:201, ChatGPT (Copilot key), exec, omarchy-launch-webapp "https://chatgpt.com"

# Voice-to-Text (Alt+S to toggle recording)
# Using voxtype (offline AI dictation) - press to start, press again to stop
bindd = ALT, S, Voice to Text, exec, voxtype record toggle


# ============================================================================
# UNIVERSAL CLIPBOARD BINDINGS - DO NOT MODIFY
# ============================================================================
# These use Ctrl+Insert / Shift+Insert which work in ALL applications.
#
# WARNING: Do NOT replace these with custom scripts using wtype or wl-copy.
# Wayland's security model blocks synthetic keyboard input (wtype) in most
# apps including browsers. This was broken before and fixed on 2026-01-28.
#
# If clipboard stops working in browsers/apps, restore these exact lines:
#   bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
#   bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
# ============================================================================
unbind = SUPER, C
unbind = SUPER, V
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X,

# Smart kill: kills process only if it's the last window, otherwise just closes window
bindd = SUPER, Q, Smart kill application, exec, ~/.local/bin/hypr-smart-kill

# OCR text capture (replaces toggle floating which was Super+T)
unbind = SUPER, T
bindd = SUPER, T, OCR text capture, exec, flatpak run com.github.dynobo.normcap

# Screenshot with annotation (Satty - CleanShot X replacement)
bindd = SUPER SHIFT, S, Screenshot + annotate, exec, grim -g "$(slurp)" - | satty --filename - --fullscreen --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H%M%S').png
bindd = , Print, Screenshot area, exec, grim -g "$(slurp)" - | satty --filename - --fullscreen --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H%M%S').png

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

