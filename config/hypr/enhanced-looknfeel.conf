# Enhanced Look & Feel - Subtle improvements to match beautiful Waybar
# Optional enhancement - source this in hyprland.conf if you like it

# Variables - Subtle, elegant colors
$activeBorderColor = rgba(007AFF40)      # Soft iOS blue
$inactiveBorderColor = rgba(8E8E9330)    # Subtle gray
$shadowColor = rgba(1a1a1a80)           # Soft shadow

# General - Refined but subtle
general {
    gaps_in = 6                          # Slightly larger gaps for elegance
    gaps_out = 12                        # Breathing room
    border_size = 1                      # Thinner, more elegant borders
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    resize_on_border = true              # Convenient resizing
    allow_tearing = false
    layout = dwindle
}

# Decoration - Subtle enhancements
decoration {
    rounding = 8                         # Subtle rounded corners
    
    # Soft drop shadows
    shadow {
        enabled = true
        range = 6
        render_power = 2
        color = $shadowColor
        offset = 2, 4
    }
    
    # Very subtle blur for inactive windows
    blur {
        enabled = true
        size = 2
        passes = 1
        new_optimizations = true
        ignore_opacity = true
        noise = 0.1
        contrast = 1.1
        brightness = 1.0
        special = false
    }
    
    # Window opacity - subtle transparency
    active_opacity = 1.0
    inactive_opacity = 0.95
}

# Animations - Smooth and refined
animations {
    enabled = true
    
    # Smooth bezier curves
    bezier = subtle, 0.25, 0.46, 0.45, 0.94
    bezier = elegant, 0.4, 0.0, 0.2, 1
    
    # Window animations
    animation = windows, 1, 6, subtle, slide
    animation = windowsOut, 1, 5, elegant, popin 90%
    animation = windowsMove, 1, 5, subtle
    
    # Fade animations
    animation = fade, 1, 8, elegant
    animation = fadeOut, 1, 6, elegant
    
    # Workspace animations
    animation = workspaces, 1, 7, subtle, slidefade 15%
    
    # Border animations
    animation = border, 1, 8, elegant
    animation = borderangle, 1, 12, elegant, loop
}

# Layout - Subtle improvements
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
    smart_resizing = true
}

# Miscellaneous - Quality of life
misc {
    disable_hyprland_logo = true        # Clean desktop
    disable_splash_rendering = true     # Faster startup
    force_default_wallpaper = 0         # No default wallpaper
    vfr = true                          # Variable framerate for efficiency
    vrr = 1                             # Variable refresh rate if supported
    mouse_move_enables_dpms = true      # Wake on mouse movement
    key_press_enables_dpms = true       # Wake on key press
    animate_manual_resizes = true       # Smooth manual resizing
    animate_mouse_windowdragging = true # Smooth window dragging
    enable_swallow = true               # Terminal window swallowing
}

# Input - Refined feel
input {
    follow_mouse = 1                    # Focus follows mouse
    sensitivity = 0                     # No mouse acceleration
    accel_profile = flat                # Consistent mouse movement
    
    touchpad {
        natural_scroll = true
        tap-to-click = true
        tap-and-drag = true
        drag_lock = false
        disable_while_typing = true
        middle_button_emulation = false
        scroll_factor = 0.3             # Smooth scrolling
    }
}

# Group styling - For window groups
group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    
    groupbar {
        render_titles = true
        font_family = SF Pro Display
        font_size = 11
        text_color = rgba(F0F0F0FF)
        col.active = rgba(007AFF80)
        col.inactive = rgba(8E8E9330)
        height = 18
    }
}