# User override for windows.conf - fixes Hyprland 0.53.0 compatibility
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Suppress maximize events for all windows (prevents tiling WM maximize conflicts)
windowrulev2 = suppressevent maximize, class:.*

# Default opacity for all windows
windowrulev2 = opacity 0.97 0.9, class:.*

# Fix dragging issues with XWayland windows
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# App-specific tweaks (Omarchy defaults have outdated v1 syntax - using v2 overrides below)
# DO NOT source Omarchy app configs - they use deprecated windowrule v1 syntax incompatible with Hyprland 0.53+

# Browser rules (converted from Omarchy's browser.conf to v2 syntax)
# Chromium-based browsers
windowrulev2 = tag +chromium-based-browser, class:((google-)?[cC]hrom(e|ium)|[bB]rave-browser|[mM]icrosoft-edge|Vivaldi-stable|helium)
windowrulev2 = tile, tag:chromium-based-browser
windowrulev2 = opacity 1.0 0.97, tag:chromium-based-browser

# Firefox-based browsers
windowrulev2 = tag +firefox-based-browser, class:([fF]irefox|zen|librewolf)
windowrulev2 = opacity 1.0 0.97, tag:firefox-based-browser

# Video sites should never have opacity applied
windowrulev2 = opacity 1.0 1.0, initialTitle:((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home)

# Hyprshot (screenshot tool)
windowrulev2 = noanim, class:(hyprshot)

# JetBrains IDEs splash screens
windowrulev2 = center, class:^(jetbrains-.*)$, title:^(splash)$
windowrulev2 = nofocus, class:^(jetbrains-.*)$, title:^(splash)$
windowrulev2 = noborder, class:^(jetbrains-.*)$, title:^(splash)$

# JetBrains IDE main windows
windowrulev2 = center, class:^(jetbrains-.*)$, title:^(Welcome to.*)$
windowrulev2 = stayfocused, class:^(jetbrains-.*)$, floating:1
windowrulev2 = noborder, class:^(jetbrains-.*)$, floating:1

# JetBrains popups
windowrulev2 = noinitialfocus, class:^(jetbrains-.*)$, title:^(win.*)$
windowrulev2 = nofollowmouse, class:^(jetbrains-.*)$, floating:1

# LocalSend
windowrulev2 = float, class:(org.localsend.localsend_app)
windowrulev2 = center, class:(org.localsend.localsend_app)

# Picture-in-Picture
windowrulev2 = tag +pip, title:(Picture.?in.?[Pp]icture)
windowrulev2 = float, tag:pip
windowrulev2 = pin, tag:pip
windowrulev2 = keepaspectratio, tag:pip
windowrulev2 = noborder, tag:pip

# QEMU/virt-manager
windowrulev2 = tag +qemu, class:(virt-manager|qemu)
windowrulev2 = float, tag:qemu
windowrulev2 = center, tag:qemu

# RetroArch
windowrulev2 = fullscreen, class:(retroarch)

# Steam
windowrulev2 = float, class:(steam), title:(Steam)
windowrulev2 = float, class:(steam), title:(Friends List)

# System dialogs
windowrulev2 = float, class:(zenity|blueberry.py|pavucontrol)
windowrulev2 = center, class:(zenity|blueberry.py|pavucontrol)

# Terminal emulators
windowrulev2 = opacity 0.95 0.85, class:(Alacritty|kitty|foot|waveterm)

# Walker (app launcher)
windowrulev2 = stayfocused, class:(Walker)
windowrulev2 = noborder, class:(Walker)

# Webcam overlay
windowrulev2 = float, class:(webcam-overlay)
windowrulev2 = pin, class:(webcam-overlay)
windowrulev2 = noborder, class:(webcam-overlay)

# Omarchy screensaver (terminal-based) - must be fullscreen
windowrulev2 = fullscreen 1, class:^org\.omarchy\.screensaver$
windowrulev2 = float, class:^org\.omarchy\.screensaver$
windowrulev2 = noanim, class:^org\.omarchy\.screensaver$
windowrulev2 = noborder, class:^org\.omarchy\.screensaver$
windowrulev2 = opacity 1.0 1.0, class:^org\.omarchy\.screensaver$
