# User override for windows.conf - Hyprland 0.53.3+ syntax
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

# Suppress maximize events for all windows (prevents tiling WM maximize conflicts)
windowrule = suppress_event maximize, match:class .*

# Default opacity for all windows
windowrule = opacity 0.97 0.9, match:class .*

# Fix dragging issues with XWayland windows
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0

# App-specific tweaks (Hyprland 0.53+ syntax)

# Browser rules
# Chromium-based browsers
windowrule = tag +chromium-based-browser, match:class ((google-)?[cC]hrom(e|ium)|[bB]rave-browser|[mM]icrosoft-edge|Vivaldi-stable|helium)
windowrule = tile on, match:tag chromium-based-browser
windowrule = opacity 1.0 0.97, match:tag chromium-based-browser

# Firefox-based browsers
windowrule = tag +firefox-based-browser, match:class ([fF]irefox|zen|librewolf)
windowrule = opacity 1.0 0.97, match:tag firefox-based-browser

# Video sites should never have opacity applied
windowrule = opacity 1.0 1.0, match:initial_title ((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home)

# Hyprshot (screenshot tool)
windowrule = no_anim on, match:class (hyprshot)

# JetBrains IDEs splash screens
windowrule = center on, match:class ^(jetbrains-.*)$, match:title ^(splash)$
windowrule = no_focus on, match:class ^(jetbrains-.*)$, match:title ^(splash)$
windowrule = border_size 0, match:class ^(jetbrains-.*)$, match:title ^(splash)$

# JetBrains IDE main windows
windowrule = center on, match:class ^(jetbrains-.*)$, match:title ^(Welcome to.*)$
windowrule = stay_focused on, match:class ^(jetbrains-.*)$, match:float 1
windowrule = border_size 0, match:class ^(jetbrains-.*)$, match:float 1

# JetBrains popups
windowrule = no_initial_focus on, match:class ^(jetbrains-.*)$, match:title ^(win.*)$
windowrule = no_follow_mouse on, match:class ^(jetbrains-.*)$, match:float 1

# LocalSend
windowrule = float on, match:class (org.localsend.localsend_app)
windowrule = center on, match:class (org.localsend.localsend_app)

# Picture-in-Picture
windowrule = tag +pip, match:title (Picture.?in.?[Pp]icture)
windowrule = float on, match:tag pip
windowrule = pin on, match:tag pip
windowrule = keep_aspect_ratio on, match:tag pip
windowrule = border_size 0, match:tag pip

# QEMU/virt-manager
windowrule = tag +qemu, match:class (virt-manager|qemu)
windowrule = float on, match:tag qemu
windowrule = center on, match:tag qemu

# RetroArch
windowrule = fullscreen on, match:class (retroarch)

# Steam
windowrule = float on, match:class (steam), match:title (Steam)
windowrule = float on, match:class (steam), match:title (Friends List)

# System dialogs
windowrule = float on, match:class (zenity|blueberry.py|pavucontrol)
windowrule = center on, match:class (zenity|blueberry.py|pavucontrol)

# Terminal emulators
windowrule = opacity 0.95 0.85, match:class (Alacritty|kitty|foot|waveterm)

# Walker (app launcher)
windowrule = stay_focused on, match:class (Walker)
windowrule = border_size 0, match:class (Walker)
windowrule = opacity 1.0 1.0, match:class (Walker)

# Webcam overlay
windowrule = float on, match:class (webcam-overlay)
windowrule = pin on, match:class (webcam-overlay)
windowrule = border_size 0, match:class (webcam-overlay)

# Omarchy screensaver (terminal-based) - must be fullscreen
windowrule = fullscreen 1, match:class ^org\.omarchy\.screensaver$
windowrule = float on, match:class ^org\.omarchy\.screensaver$
windowrule = no_anim on, match:class ^org\.omarchy\.screensaver$
windowrule = border_size 0, match:class ^org\.omarchy\.screensaver$
windowrule = opacity 1.0 1.0, match:class ^org\.omarchy\.screensaver$
